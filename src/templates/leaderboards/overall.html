{% extends "base.html" %}

{% block content %}
<div class="ui container">
  <h1 class="ui header">总体排行榜（组织）</h1>
  <table class="ui celled table">
    <thead>
      <tr>
        <th>排名</th>
        <th>组织名称</th>
        <th>总积分</th>
      </tr>
    </thead>
    <tbody>
      {% for entry in leaderboard_list %}
      <tr>
        <td>{{ forloop.counter }}</td>
        <td>{{ entry.organization.name }}</td>
        <td>{{ entry.total_points|floatformat:2 }}</td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="3">暂无数据</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
